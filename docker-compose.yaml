version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    # bind mount the single file so changes persist on the host
    volumes:
      - ./k8s.txt:/app/k8s.txt

# no named volumes needed for a single file in this case
volumes: {}
