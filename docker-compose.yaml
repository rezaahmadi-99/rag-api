services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    # bind mount the single file so changes persist on the host
    volumes:
      - ./knowledgebase.txt:/app/knowledgebase.txt

# no named volumes needed for a single file in this case
volumes: {}
